<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Channel Connect</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#020617,#020617,#07152c);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#0d1117;
padding:25px;
border-radius:20px;
width:90%;
max-width:400px;
box-shadow:0 0 40px rgba(0,255,170,0.1);
text-align:center;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:15px;
background:#020617;
color:white;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00ff9c,#00c3ff);
color:black;
font-size:16px;
font-weight:bold;
}

.post{
background:#020617;
padding:12px;
border-radius:12px;
margin-top:15px;
text-align:left;
}

.post img{
width:100%;
border-radius:10px;
}

.openBtn{
display:block;
margin-top:8px;
background:#00ff9c;
padding:6px;
border-radius:6px;
text-align:center;
text-decoration:none;
color:black;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card" id="home">
<h2>📡 Channel Connect</h2>
<p style="opacity:.6">Enter Telegram Username</p>

<input id="channel" placeholder="ex: technews">
<button onclick="openChannel()">Open Channel</button>

<p style="margin-top:10px;font-size:12px;opacity:.4">
Smart DeepLink Enabled ✔
</p>

</div>

<script>

// Detect join link
let params = new URLSearchParams(window.location.search);
let join = params.get("join");

if(join){
showChannel(join);
}

// Open button
function openChannel(){
let name = document.getElementById("channel").value;
window.location.href="?join="+name;
}

// Channel Page
function showChannel(name){

document.body.innerHTML = `

<div style="padding:15px">

<h2 style="color:#00ff9c">📢 ${name}</h2>
<p style="opacity:0.5">Subscribers: 124</p>

<hr style="margin:15px 0">

<div class="post">
<img src="https://picsum.photos/400/200">
<p>🚀 New AI Tool Launched!</p>
<a class="openBtn" href="#">Open</a>
</div>

<div class="post">
<img src="https://picsum.photos/401/200">
<p>🔥 Telegram Update Released</p>
<a class="openBtn" href="#">Open</a>
</div>

<div class="post">
<img src="https://picsum.photos/402/200">
<p>🎬 Latest Movie News</p>
<a class="openBtn" href="#">Open</a>
</div>

</div>
`;
}

// PWA Service Worker
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
