<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Telegram Channel App</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">

<style>
body{
margin:0;
background:#000;
color:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#111;
padding:25px;
border-radius:15px;
width:90%;
text-align:center;
}

input{
padding:12px;
width:100%;
border-radius:8px;
border:none;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#00c896;
border:none;
border-radius:8px;
font-size:16px;
color:white;
}
</style>
</head>

<body>

<div class="box" id="loginBox">
<h2>Admin Login</h2>
<input id="pass" placeholder="Enter Admin Password">
<button onclick="login()">Login</button>
</div>

<div class="box" id="adminBox" style="display:none;">
<h2>Admin Panel</h2>
<input id="msg" placeholder="Write Post">
<button onclick="addPost()">Add Post</button>
<br><br>
<button onclick="logout()">Logout</button>
</div>

<script>

const ADMIN_PASSWORD = "1234";

function login(){
let p = document.getElementById("pass").value;
if(p === ADMIN_PASSWORD){
document.getElementById("loginBox").style.display="none";
document.getElementById("adminBox").style.display="block";
}else{
alert("Wrong Password");
}
}

function logout(){
location.reload();
}

function addPost(){
let text = document.getElementById("msg").value;
localStorage.setItem("post", text);
alert("Post Added");
}

// service worker
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/sw.js');
}

</script>

</body>
</html>
