<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Telegram Channel App</title><link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes"><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#020617,#0f172a);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:90%;
max-width:420px;
background:#020617;
border-radius:25px;
padding:25px;
box-shadow:0 0 40px rgba(0,0,0,0.6);
text-align:center;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:15px;
color:#22c55e;
}

.desc{
font-size:14px;
color:#94a3b8;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#0f172a;
color:white;
font-size:16px;
margin-bottom:15px;
outline:none;
}

button{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:linear-gradient(90deg,#22c55e,#4ade80);
font-size:16px;
font-weight:bold;
color:#022c22;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}

.footer{
margin-top:20px;
font-size:12px;
color:#64748b;
}
</style></head><body><div class="container">
<div class="logo">📡 Channel Connect</div>
<div class="desc">Enter Telegram Channel Username</div><input id="channel" placeholder="ex: technews" /><button onclick="openChannel()">Open Channel</button>

<div class="footer">
Smart Link Enabled ✔️
</div>
</div><script>
function openChannel(){
let ch = document.getElementById("channel").value;
if(ch){
window.location.href = "?join=" + ch;
}
}

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/sw.js');
}
</script></body>
</html>
