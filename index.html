<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Channel Connect</title>

<link rel="manifest" href="/manifest.json">

<meta name="theme-color" content="#0a0f1c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

body{
margin:0;
font-family:Arial;
background:#0a0f1c;
color:white;
}

/* HEADER */
.header{
background:#0f172a;
padding:18px;
font-size:20px;
font-weight:bold;
display:flex;
align-items:center;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.header span{
margin-left:10px;
}

/* CHANNEL LIST */
.channel-list{
padding:15px;
}

.channel{
display:flex;
align-items:center;
background:#111827;
padding:15px;
border-radius:15px;
margin-bottom:12px;
cursor:pointer;
transition:0.3s;
}

.channel:hover{
background:#1f2937;
}

.dp{
width:50px;
height:50px;
border-radius:50%;
background:linear-gradient(45deg,#22c55e,#3b82f6);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
margin-right:15px;
}

.details{
flex:1;
}

.name{
font-size:16px;
font-weight:bold;
}

.last{
font-size:13px;
opacity:0.7;
margin-top:5px;
}

/* FLOAT BUTTON */
.fab{
position:fixed;
bottom:25px;
right:25px;
background:#22c55e;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
cursor:pointer;
}

/* ADD MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.box{
background:#111827;
padding:25px;
border-radius:15px;
width:80%;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:16px;
}

</style>
</head>

<body>

<div class="header">
📡 <span>Channel Connect</span>
</div>

<div class="channel-list" id="channels">

<div class="channel" onclick="openChannel('technews')">
<div class="dp">📢</div>
<div class="details">
<div class="name">Tech News</div>
<div class="last">Latest AI updates</div>
</div>
</div>

<div class="channel" onclick="openChannel('movies')">
<div class="dp">🎬</div>
<div class="details">
<div class="name">Movie Zone</div>
<div class="last">New releases daily</div>
</div>
</div>

</div>

<div class="fab" onclick="showAdd()">+</div>

<div class="modal" id="modal">
<div class="box">
<h3>Add Channel</h3>
<input id="ch" placeholder="Enter Channel Name">
<button onclick="addChannel()">Join</button>
</div>
</div>

<script>

function showAdd(){
document.getElementById("modal").style.display="flex";
}

function addChannel(){
let ch=document.getElementById("ch").value;
if(ch){
openChannel(ch);
}
}

function openChannel(name){
window.location.href="?join="+name;
}

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/sw.js');
}

</script>

</body>
</html>
